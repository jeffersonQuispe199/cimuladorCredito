<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>

</div>
    <div class="container">
        <div class="logo-container">
    <img src="tu_logo.png" alt="Logo" class="logo">
        <h1>Simulador de Crédito</h1>

        <h2>Datos financieros</h2>
        <label for="txtIngresos">Ingresos:</label>
        <input type="text" id="txtIngresos">

        <label for="txtArriendo">Arriendo:</label>
        <input type="text" id="txtArriendo">

        <label for="txtAlimentacion">Alimentación:</label>
        <input type="text" id="txtAlimentacion">

        <label for="txtVarios">Varios:</label>
        <input type="text" id="txtVarios">

        <p>Total Gastos: <span id="spnTotalEgresos">0.00</span></p>
        <hr>
        <p>Disponible: <span id="spnDisponible"></span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>

        <h2>Solicitud de crédito</h2>
        <label for="txtMonto">Monto:</label>
        <input type="text" id="txtMonto">

        <label for="txtPlazo">Plazo en años:</label>
        <input type="text" id="txtPlazo">

        <label for="txtTasaInteres">Tasa de interés (%):</label>
        <input type="text" id="txtTasaInteres">

        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito" style="font-weight: bold;">ANALIZANDO...</span></p>

        <div class="buttons">
            <button onclick="calcular();" id="btnCalcularCredito">Calcular Crédito</button>
            <button onclick="location.reload();" id="btnReiniciar">Reiniciar</button>
        </div>
    </div>
  
</body>
</html>
